# 하네스 밖 이중 검증 — 로컬 /verify와 별개로 리모트에서 한 번 더 확인한다.
# 백엔드(gradlew)·프론트 스크립트(lint/test)는 생기는 대로 자동으로 검증 대상에 포함된다.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 25 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # 루트·한 단계 하위 gradlew를 전부 빌드 — scripts/verify.sh와 동일 규칙 (pms_back·pms-mcp-mock 포함)
      - name: Gradle 빌드 + 테스트 (Modulith/ArchUnit·Testcontainers 포함)
        run: |
          FOUND=0
          for GW in ./gradlew ./*/gradlew; do
            [ -f "$GW" ] || continue
            FOUND=1
            DIR=$(dirname "$GW")
            echo "=== Gradle ($DIR) ==="
            (cd "$DIR" && chmod +x gradlew && ./gradlew build)
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "gradlew 없음 — 백엔드 검증 건너뜀"
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 린트 (스크립트 있을 때만)
        run: |
          if npm run | grep -qE '^  lint$'; then
            npm run lint
          else
            echo "lint 스크립트 없음 — 건너뜀"
          fi

      - name: 테스트 (스크립트 있을 때만)
        run: |
          if npm run | grep -qE '^  test$'; then
            npm run test
          else
            echo "test 스크립트 없음 — 건너뜀"
          fi

      - name: 빌드
        run: npm run build
